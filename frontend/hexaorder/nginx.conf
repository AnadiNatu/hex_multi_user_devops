# ============================================================
# Nginx configuration for HexaOrder frontend
# Serves the React SPA and proxies API calls to the backend
# ============================================================

server {
    listen 80;
    server_name _;

    # ── Root directory ──────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml;

    # ── Security headers ────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"   always;
    add_header X-Content-Type-Options  "nosniff"      always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Static asset caching ────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API reverse proxy → Spring Boot backend ─────────────
    # All /api/** requests are forwarded to the backend service.
    # The service name "backend" matches the docker-compose service name.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts suitable for long-running auth / OAuth flows
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── OAuth2 / Spring Security OAuth routes ───────────────
    # These hit the backend directly (not prefixed with /api/)
    location ~ ^/(oauth2|login/oauth2|oauth)/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── React SPA fallback ──────────────────────────────────
    # Any route not matched above serves index.html so that
    # React Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health check endpoint (used by load balancer / ECS) ─
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
