# ============================================================================
# HexaOrder Production Nginx Configuration
# Domain:
# https://hexagonal-multiuser.andiwebsolutions.com
#
# Frontend : React (Vite)
# Backend  : Spring Boot
# SSL      : Let's Encrypt
# ============================================================================

# ============================================================================
# HTTP
# Redirect everything to HTTPS
# ============================================================================

server {

    listen 80;
    listen [::]:80;

    server_name hexagonal-multiuser.andiwebsolutions.com;

    return 301 https://$host$request_uri;
}

# ============================================================================
# HTTPS
# ============================================================================

server {

    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name hexagonal-multiuser.andiwebsolutions.com;

    # =========================================================================
    # SSL
    # =========================================================================

    ssl_certificate     /etc/letsencrypt/live/hexagonal-multiuser.andiwebsolutions.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hexagonal-multiuser.andiwebsolutions.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    ssl_prefer_server_ciphers on;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    # =========================================================================
    # Security Headers
    # =========================================================================

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # =========================================================================
    # Root
    # =========================================================================

    root /usr/share/nginx/html;

    index index.html;

    # =========================================================================
    # Gzip
    # =========================================================================

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;

    gzip_vary on;
    gzip_proxied any;

    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        image/svg+xml
        text/javascript;

    # =========================================================================
    # Static Assets
    # =========================================================================

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {

        expires 1y;

        add_header Cache-Control "public, immutable";

        access_log off;

        try_files $uri =404;
    }

    # =========================================================================
    # Backend API
    # ==========================================================================

    location /api/ {

        proxy_pass http://backend:8080;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # =========================================================================
    # OAuth2
    # ==========================================================================

    location /oauth2/ {

        proxy_pass http://backend:8080;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /login/oauth2/ {

        proxy_pass http://backend:8080;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /oauth/ {

        proxy_pass http://backend:8080;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # =========================================================================
    # Health
    # ==========================================================================

    location /health {

        access_log off;

        return 200 "healthy\n";

        add_header Content-Type text/plain;
    }

    # =========================================================================
    # React Router
    # ==========================================================================

    location / {

        try_files $uri $uri/ /index.html;
    }

    server_tokens off;
}