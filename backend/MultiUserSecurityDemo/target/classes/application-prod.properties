# ==========================================================
# application-prod.properties
# Production / AWS Deployment Profile
# Active when SPRING_PROFILES_ACTIVE=prod
#
# All secrets are supplied through environment variables.
# No credentials should ever be hardcoded here.
# ==========================================================

# ==========================================================
# DATABASE
# ==========================================================

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ==========================================================
# HIKARI CONNECTION POOL
# ==========================================================

spring.datasource.hikari.pool-name=MultiUserPool

spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000

spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ==========================================================
# JWT
# ==========================================================

jwt.secret=${JWT_SECRET}

# ==========================================================
# FRONTEND
# ==========================================================

app.frontend.url=${APP_FRONTEND_URL}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
app.oauth2.redirect-uri=${APP_OAUTH2_REDIRECT_URI}

# ==========================================================
# MAIL
# ==========================================================

spring.mail.host=smtp.gmail.com
spring.mail.port=587

spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

management.health.mail.enabled=false

# ==========================================================
# GOOGLE OAUTH2
# ==========================================================

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# ==========================================================
# TWILIO
# ==========================================================

twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.phone-number=${TWILIO_PHONE_NUMBER}

# ==========================================================
# CLOUDINARY
# ==========================================================

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ==========================================================
# AWS S3
# ==========================================================

cloud.aws.region.static=${AWS_REGION}
aws.bucket.name=${AWS_BUCKET_NAME}

# AWS_ACCESS_KEY_ID
# AWS_SECRET_ACCESS_KEY
# are automatically read by the AWS SDK.

# ==========================================================
# SERVER
# ==========================================================

server.forward-headers-strategy=framework

# ==========================================================
# LOGGING
# ==========================================================

logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=WARN
logging.level.com.example=INFO

# ==========================================================
# ACTUATOR
# ==========================================================

management.health.db.enabled=true
management.health.diskspace.enabled=true

# Keep-alive query so RDS idle connections don't get dropped

# ==========================================================
# SUPABASE
# ==========================================================

supabase.url={SUPABASE_URL}
supabase.api.key={SUPABASE_API_KEY}
supabase.storage.bucket={SUPABASE_STORAGE_BUCKET}

# ==========================================================
#TEST USERS
# ==========================================================

app.test-users.enabled=true