# ==========================================================
# application-local.properties
# Local Development Profile
# Used when running from IntelliJ / VS Code
# Profile: local
# ==========================================================

# ---------- Database ----------
spring.datasource.url=jdbc:postgresql://localhost:5432/multiuserdb
spring.datasource.username=postgres
spring.datasource.password=YOUR_LOCAL_POSTGRES_PASSWORD

# ---------- JWT ----------
jwt.secret=YOUR_LOCAL_JWT_SECRET

# ---------- Frontend ----------
app.frontend.url=http://localhost:5173
app.cors.allowed-origins=http://localhost:5173
app.oauth2.redirect-uri=http://localhost:5173/oauth2/callback

# ---------- Mail ----------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_GMAIL@gmail.com
spring.mail.password=YOUR_GMAIL_APP_PASSWORD

# ---------- OAuth2 ----------
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET

# ---------- Cloudinary ----------
cloudinary.cloud-name=YOUR_CLOUD_NAME
cloudinary.api-key=YOUR_API_KEY
cloudinary.api-secret=YOUR_API_SECRET

# ---------- Logging ----------
logging.level.com.example=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# ── AWS ──────────────────────────────────────────────────────
#cloud.aws.region.static=
#aws.bucket.name=
# Leave blank locally — S3 will not be reachable without real keys