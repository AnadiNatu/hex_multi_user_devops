# ============================================================
# application-local.properties
# Active when SPRING_PROFILES_ACTIVE=local (default on dev machines)
# ============================================================

# ── DataSource ───────────────────────────────────────────────
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/MultiUserDB
spring.datasource.username=postgres
spring.datasource.password=Anadi@1234

# ── JWT ───────────────────────────────────────────────────────
jwt.secret=MySuperSecretKeyMySuperSecretKeyMySuperSecretKey

# ── Mail ─────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Twilio ───────────────────────────────────────────────────
twilio.account-sid=
twilio.auth-token=
twilio.phone-number=

# ── Google OAuth2 ─────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=
spring.security.oauth2.client.registration.google.client-secret=

# ── Cloudinary ───────────────────────────────────────────────
cloudinary.cloud-name=
cloudinary.api-key=
cloudinary.api-secret=

# ── AWS ──────────────────────────────────────────────────────
cloud.aws.region.static=ap-south-1
aws.bucket.name=s3-hex-multiuser
# Leave blank locally — S3 will not be reachable without real keys