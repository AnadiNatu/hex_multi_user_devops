# ── Application ──────────────────────────────────────────────
spring.application.name=MultiUserSecurityDemo

# ── Jackson ─────────
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false


# ── Multipart ─────────
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ── Active Profile (overridden by env var in Docker) ─────────
# spring.profiles.active=local
spring.profiles.active=docker
# spring.profiles.active=prod

# ── Server ───────────────────────────────────────────────────
server.port=8080

# Forward headers from Nginx (needed for OAuth2 redirect URIs)
server.forward-headers-strategy=framework

# ── JPA ──────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────────────
jwt.expiration=3600000
jwt.refresh.expiration=604800000

# ── OTP ──────────────────────────────────────────────────────
otp.expiry-minutes=5

# ── Session ──────────────────────────────────────────────────
spring.session.store-type=none
spring.session.timeout=2592000s

# ── Actuator ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true

# ── Logging ──────────────────────────────────────────────────
logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.com.example=DEBUG

# ── CORS / Frontend ──────────────────────────────────────────
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

# ── Mail ─────────
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Upload ─────────
app.upload.max-size=20MB

# ── Cache ─────────
spring.cache.type=caffeine

# ── OAuth2 Redirect ──────────────────────────────────────────
app.oauth2.redirect-uri=${APP_OAUTH2_REDIRECT_URI}
spring.security.oauth2.client.registration.google.scope=email,profile
