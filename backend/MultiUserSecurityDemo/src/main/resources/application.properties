# ── Application ──────────────────────────────────────────────
spring.application.name=MultiUserSecurityDemo

# ── Active Profile (overridden by env var in Docker) ─────────
# spring.profiles.active=local
spring.profiles.active=docker
spring.profiles.active=prod

# ── Server ───────────────────────────────────────────────────
server.port=8080

# Forward headers from Nginx (needed for OAuth2 redirect URIs)
server.forward-headers-strategy=framework

# ── JPA ──────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────────────
jwt.expiration=86400000

# ── OTP ──────────────────────────────────────────────────────
otp.expiry-minutes=5

# ── Session ──────────────────────────────────────────────────
spring.session.store-type=none
spring.session.timeout=2592000s

# ── Actuator ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true

# ── Logging ──────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.example.MultiUserSecurityDemo=DEBUG
logging.level.org.springframework.security=INFO

# ── CORS / Frontend ──────────────────────────────────────────
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost}

# ── OAuth2 Redirect ──────────────────────────────────────────
app.oauth2.redirect-uri=${APP_OAUTH2_REDIRECT_URI:http://localhost:5173/oauth2/callback}