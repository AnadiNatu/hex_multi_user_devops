# ============================================================
# application-docker.properties
# Active when SPRING_PROFILES_ACTIVE=docker
# All sensitive values come from environment variables.
# ============================================================

# ── DataSource ───────────────────────────────────────────────
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Connection pool (HikariCP defaults are sensible, but set minimums for EC2)
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# Keep-alive query so RDS idle connections don't get dropped
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ── JWT ───────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}

# ── Mail ─────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ── Twilio ───────────────────────────────────────────────────
twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.phone-number=${TWILIO_PHONE_NUMBER}

# ── Google OAuth2 ─────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# ── Cloudinary ───────────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ── AWS S3 ───────────────────────────────────────────────────
cloud.aws.region.static=${AWS_REGION:ap-south-1}
aws.bucket.name=${AWS_BUCKET_NAME:s3-hex-multiuser}
# Credentials are passed via AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
# env vars — the AWS SDK picks them up automatically via DefaultCredentialsProvider

# ── Logging (quieter in production) ──────────────────────────
logging.level.root=WARN
logging.level.com.example.MultiUserSecurityDemo=INFO
logging.level.org.springframework.security=WARN