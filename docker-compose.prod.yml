# ============================================================
# docker-compose.prod.yml  — AWS Production override
#
# Folder layout expected on EC2:
#
#   ~/hexaorder-app/
#   ├── MultiUserSecurityDemo/   ← backend repo
#   ├── hexaorder/               ← frontend repo
#   └── devops/                  ← THIS repo (run compose from here)
#
# Use this INSTEAD of docker-compose.yml on the EC2 instance:
#
#   docker compose -f docker-compose.prod.yml \
#                  --env-file .env.prod \
#                  up -d --build
#
# Key differences from dev compose:
#   • postgres service is REMOVED — uses AWS RDS instead
#   • backend depends on a simple tcp healthcheck to RDS
#   • Internal 5432 port is NOT exposed
#   • Stricter restart policy
# ============================================================

services:

  # ──────────────────────────────────────────────────────────
  # BACKEND  — connects to AWS RDS PostgreSQL
  # ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend/MultiUserSecurityDemo    # sibling folder — separate git repo
      dockerfile: Dockerfile
    container_name: hex_backend
    restart: always

    environment:
      SPRING_PROFILES_ACTIVE: docker

      # ── RDS Connection ────────────────────────────────────
      # DB_URL format for RDS:
      # jdbc:postgresql://<rds-endpoint>:5432/<db-name>
      # Example:
      # jdbc:postgresql://hex-multiuser-database.xxxxxxxxx.ap-south-1.rds.amazonaws.com:5432/MultiUserDB
      DB_URL:      ${DB_URL}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}

      # ── JWT ───────────────────────────────────────────────
      JWT_SECRET: ${JWT_SECRET}

      # ── Mail ─────────────────────────────────────────────
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

      # ── Twilio ───────────────────────────────────────────
      TWILIO_ACCOUNT_SID:  ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN:   ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}

      # ── Google OAuth2 ────────────────────────────────────
      GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

      # ── Cloudinary ───────────────────────────────────────
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY:    ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}

      # ── AWS S3 (IAM credentials for s3-hex-multi-user) ───
      AWS_REGION:            ${AWS_REGION:-ap-south-1}
      AWS_BUCKET_NAME:       ${AWS_BUCKET_NAME:-s3-hex-multiuser}
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}

      # ── Frontend / CORS ──────────────────────────────────
      APP_FRONTEND_URL:         ${APP_FRONTEND_URL}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      APP_OAUTH2_REDIRECT_URI:  ${APP_OAUTH2_REDIRECT_URI}

      JAVA_TOOL_OPTIONS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"

    # Do NOT expose 8080 externally in production — Nginx is the only ingress
    expose:
      - "8080"

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

    networks:
      - hex_net

  # ──────────────────────────────────────────────────────────
  # FRONTEND  — React/Vite served by Nginx
  # ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend/hexaorder               # sibling folder — separate git repo
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: hex_frontend
    restart: always

    ports:
      - "80:80"
      - "443:443"

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - hex_net

networks:
  hex_net:
    driver: bridge