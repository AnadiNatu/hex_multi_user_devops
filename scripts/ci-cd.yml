# ============================================================
# .github/workflows/deploy.yml
# CI/CD: Build → Push to ECR → SSH deploy to EC2
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   EC2_HOST, EC2_USER, EC2_SSH_KEY
#   (all the app secrets from .env.prod are set on the EC2 directly)
# ============================================================

name: Build & Deploy to EC2

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1

jobs:

  # ── Build & Test Backend ──────────────────────────────────
  build-backend:
    name: Build Backend JAR
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MultiUserSecurityDemo

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (skip tests)
        run: ./mvnw clean package -DskipTests -q

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: MultiUserSecurityDemo/target/multiuser-demo.jar
          retention-days: 1

  # ── Build Frontend ────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hexaorder

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: hexaorder/package-lock.json

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: /api

  # ── Deploy to EC2 ─────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/hexaorder-app
            git pull origin main
            docker compose -f docker-compose.prod.yml --env-file .env.prod \
              up -d --build --remove-orphans
            docker image prune -f